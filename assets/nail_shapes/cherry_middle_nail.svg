<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 59" fill="none">
  <!-- Middle cherry nail from assets/cherry2.png  edit fill colors per group -->
  <g id="cherry-middle-nail">
    <path
      id="nail-base"
      fill="#F1DBDD"
      d="
        M 12 7
        L 28 7
        C 32 7, 33 10, 33 14
        L 33 44
        C 33 49, 29 52, 20 52
        C 11 52, 7 49, 7 44
        L 7 14
        C 7 10, 8 7, 12 7

      "
    />

    <g id="cherry-art">
      <path
        id="stem"
        stroke="#2B1A12"
        stroke-width="1.2"
        stroke-linecap="round"
        fill="none"
        d="M 16.5 34.5 C 17.5 28, 19 22, 20 19 C 21 22, 22.5 28, 23.5 34.5"
      />

      <ellipse id="leaf" cx="22.5" cy="21.5" rx="3.2" ry="5.2" fill="#2F6B3A" transform="rotate(18 22.5 21.5)" />

      <circle id="cherry-left" cx="15.5" cy="37.5" r="5.2" fill="#C41230" />
      <circle id="cherry-right" cx="24.5" cy="37.5" r="5.2" fill="#C41230" />

      <ellipse id="cherry-left-highlight" cx="14.2" cy="36" rx="1.4" ry="1.8" fill="#FFFFFF" opacity="0.55" />
      <ellipse id="cherry-right-highlight" cx="23.2" cy="36" rx="1.4" ry="1.8" fill="#FFFFFF" opacity="0.55" />
    </g>
